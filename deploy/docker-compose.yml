services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: skillpass
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d skillpass"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - skillpass

  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint: ["anvil"]
    command: ["--host", "0.0.0.0", "--chain-id", "31337"]
    ports:
      - "8545:8545"
    networks:
      - skillpass

  indexer:
    build:
      context: ..
      dockerfile: services/indexer/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      anvil:
        condition: service_started
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/skillpass?sslmode=disable
      ETH_RPC_URL: http://anvil:8545
      # Deterministic address: account[0] nonce=0 CREATE on a fresh anvil
      CONTRACT_ADDRESS: "0x5FbDB2315678afecb367f032d93F642f64180aa3"
      CHAIN_ID: "31337"
      START_BLOCK: "0"
      GRPC_ADDR: ":50051"
      POLL_INTERVAL: "2s"
      BATCH_SIZE: "2000"
    ports:
      - "50051:50051"
    networks:
      - skillpass

  gateway:
    build:
      context: ..
      dockerfile: services/gateway/Dockerfile
    depends_on:
      indexer:
        condition: service_started
    environment:
      INDEXER_GRPC_ADDR: "indexer:50051"
      HTTP_ADDR: ":8080"
      REQUEST_TIMEOUT: "5s"
    ports:
      - "8080:8080"
    networks:
      - skillpass

volumes:
  pg_data:

networks:
  skillpass:
