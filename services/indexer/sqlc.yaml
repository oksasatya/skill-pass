version: "2"
sql:
  - engine: "postgresql"
    schema: "migrations"
    queries: "internal/db/queries.sql"
    gen:
      go:
        package: "db"
        out: "internal/db"
        sql_package: "pgx/v5"
        overrides:
          # token_id is NUMERIC(78,0) to hold Solidity uint256; map to string
          # to align with proto's string token_id. Column-scoped so other numeric
          # columns (if any are added later) keep their natural pgtype.Numeric.
          - column: "certificates.token_id"
            go_type: "string"
        emit_json_tags: false
        emit_prepared_queries: false
